<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>回家之路</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --sw:148px;--swm:108px;--top:52px;
  --bg:#f0efe9;--card:#fff;--bdr:#e0dfd5;
  --txt:#1a1a18;--mut:#8a8a82;
  --bl:#185FA5;--bll:#eef3fb;
  --amb:#FAEEDA;--ambt:#633806;
  --grn:#1D9E75;--red:#cc3333;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--txt);height:100dvh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
button{font-family:inherit;cursor:pointer;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);font-size:12px;padding:6px 11px;white-space:nowrap;line-height:1.4}
button:active{opacity:.65;transform:scale(.97)}
input,textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--bdr);border-radius:9px;background:#fff;width:100%;outline:none;color:var(--txt);-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;line-height:1.55}

/* ── TOPBAR ── */
#topbar{height:var(--top);background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;padding:0 10px 0 12px;flex-shrink:0;z-index:60}
.app-tw{display:flex;align-items:baseline;gap:5px;flex-shrink:0}
.appname{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.appcnt{font-size:11px;color:var(--mut);white-space:nowrap}
#sw2{flex:1;min-width:0;position:relative}
#sw2 svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--mut);pointer-events:none}
#si{padding:8px 10px 8px 28px;border-radius:9px;background:#f7f7f4;font-size:14px}
#menubtn{width:38px;height:38px;padding:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:1px solid var(--bdr);background:#fff}
#menubtn.open{background:var(--bll);border-color:var(--bl)}

/* ── DROPDOWN ── */
#dropmenu{display:none;position:fixed;top:var(--top);right:10px;background:#fff;border:1px solid var(--bdr);border-radius:13px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:9990;min-width:190px;overflow:hidden}
#dropmenu.show{display:block}
.dmi{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;font-size:14px;color:var(--txt);border-bottom:1px solid #f0f0ea}
.dmi:last-child{border-bottom:none}
.dmi:hover{background:#f5f5f1}
.dmi svg{width:16px;height:16px;flex-shrink:0;color:var(--mut)}
#dov{display:none;position:fixed;inset:0;z-index:9989}
#dov.show{display:block}

/* ── BODY ── */
#body{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:var(--sw);background:#fff;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;user-select:none}
.sb-hdr{padding:8px 8px 6px;font-size:9px;font-weight:700;color:var(--mut);letter-spacing:.07em;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.sb-hint{font-size:8px;font-weight:400;color:#ccc;letter-spacing:0}
#alist{overflow-y:auto;flex:1;padding:6px;display:flex;flex-direction:column;gap:4px;scrollbar-width:none}
#alist::-webkit-scrollbar{display:none}
.acard{border:1.5px solid var(--bdr);border-radius:9px;padding:7px 8px 6px;cursor:pointer;background:#fff;transition:border-color .12s,background .12s;display:flex;flex-direction:column;gap:2px}
.acard:hover{border-color:#c0c0b8;background:#fafaf6}
.acard.active{border-color:var(--bl);background:var(--bll)}
.acard.drag-over{border-color:var(--bl);border-style:dashed}
.acard.dragging{opacity:.35}
.ac-name{font-size:12px;font-weight:700;color:var(--txt);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acard.active .ac-name{color:var(--bl)}
.ac-bot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bdr);padding-top:3px;margin-top:1px}
.acard.active .ac-bot{border-color:#c5d8f0}
.ac-cnt{font-size:14px;font-weight:700;color:var(--mut);line-height:1}
.acard.active .ac-cnt{color:var(--bl)}
.ac-drag{font-size:11px;color:#ccc;cursor:grab;line-height:1;touch-action:none}
.acard.active .ac-drag{color:#aac8e8}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:6px}
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* ── CARDS ── */
.card{background:var(--card);border-radius:11px;border:1px solid var(--bdr);padding:10px 11px;display:flex;align-items:center;gap:9px}
.card.nc{border-color:var(--bl);border-width:2px;animation:fb 5s ease forwards}
@keyframes fb{0%,50%{border-color:var(--bl);border-width:2px}100%{border-color:var(--bdr);border-width:1px}}
.ci{width:32px;height:32px;border-radius:50%;background:var(--bll);color:var(--bl);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb{flex:1;min-width:0}
.ca{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbl{font-size:12px;color:var(--mut);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cn2{font-size:10px;color:#bbb;margin-top:1px}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.code{font-family:'Courier New',monospace;font-size:15px;font-weight:700;background:var(--amb);color:var(--ambt);padding:4px 10px;border-radius:7px;cursor:pointer;user-select:none;letter-spacing:.05em;border:1px solid #f0d8a0}
.code:active{opacity:.7}
.cas{display:flex;gap:3px}
.bx{font-size:11px;padding:3px 7px;border-radius:6px;color:#555}
.bxd{color:var(--red);border-color:#f0c0c0}
.nb{font-size:9px;background:#e3f5e1;color:#1a7a1a;border:1px solid #b2dba8;border-radius:4px;padding:1px 5px;font-weight:700;vertical-align:middle;margin-left:4px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}

/* ── MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
#overlay.show{display:block}
.oi{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px}
#mbox{background:#fff;border-radius:18px;padding:20px;max-width:500px;width:100%;margin:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-size:17px;font-weight:700}
.mx{font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#aaa;border-radius:50%}
.mx:hover{background:#f5f5f1}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
.hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.5}
.dup{font-size:12px;color:var(--red);font-weight:600;margin-top:4px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:13px;border-top:1px solid #f0f0ea}
.bsave{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:700;font-size:14px;padding:10px 24px;border-radius:10px}
.bcancel{color:#666;border-color:#ddd}

/* AI box */
.aibox{background:#f5f8ff;border:1px solid #c5d5f5;border-radius:11px;padding:12px;margin-bottom:14px}
.ait{font-size:11px;font-weight:700;color:var(--bl);margin-bottom:8px}
.air{display:flex;gap:7px}
.aib{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:500;border:1px solid #c5d5f5;background:#fff;color:var(--bl);cursor:pointer}
.aib.cam{background:var(--bl);color:#fff;border-color:var(--bl)}
.aib:disabled{opacity:.4;cursor:default}
.sp{width:14px;height:14px;border:2px solid #c5d5f5;border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ast{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:12px;color:#555}
.aok{font-size:12px;color:var(--grn);font-weight:600;margin-top:8px}
.aerr{font-size:12px;color:var(--red);margin-top:8px}
.aprev{margin-top:10px;max-height:90px;max-width:100%;border-radius:8px;display:block;border:1px solid var(--bdr);object-fit:contain}
.sugwrap{border:1px solid var(--bdr);border-radius:9px;margin-top:5px;overflow:hidden}
.sugh{font-size:10px;padding:4px 11px;background:#f8f8f5;color:#bbb;font-weight:600}
.sugr{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5f5f0;display:flex;align-items:center;gap:8px}
.sugr:last-child{border-bottom:none}
.sugr:hover{background:#f2f6ff}
.suga{font-weight:600}
.sugb{color:#999;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sugc{font-family:monospace;font-size:11px;background:var(--amb);color:var(--ambt);padding:2px 7px;border-radius:4px;flex-shrink:0}

/* ── BATCH modal ── */
.batch-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.btab{flex:1;padding:9px 8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:#f8f8f5;color:var(--mut);border:none;border-radius:0;transition:background .1s}
.btab.active{background:var(--bl);color:#fff}
.btab:first-child{border-right:1px solid var(--bdr)}
.bdz{border:2px dashed #c8c8c0;border-radius:12px;padding:22px 16px;text-align:center;cursor:pointer;color:var(--mut);font-size:13px;background:#fafaf8;margin-bottom:13px;transition:border-color .15s,background .15s}
.bdz:hover,.bdz.over{border-color:var(--bl);background:var(--bll);color:var(--bl)}
.bdz svg{margin:0 auto 8px;display:block;opacity:.45}
.bfmt{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:7px}
.bfmt span{font-size:11px;background:#f0f0ea;color:#888;padding:2px 7px;border-radius:4px;border:1px solid #e0e0d5}
.bpaste-area{font-size:13px;line-height:1.7;min-height:120px;max-height:200px;overflow-y:auto;border-radius:10px;font-family:inherit;color:var(--txt);background:#fff;padding:10px 12px;border:1px solid var(--bdr);width:100%;resize:vertical}
.bpaste-area:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.bpaste-hint{font-size:11px;color:#aaa;margin-top:6px;line-height:1.6}
.bpaste-hint b{color:#555}
.bl2{display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto;margin-bottom:13px}
.bi{display:flex;align-items:center;gap:8px;border-radius:9px;padding:8px 10px;border:1px solid var(--bdr);font-size:13px}
.bi.bok{background:#f3fbf3;border-color:#b5ddb5}
.bi.bdup{background:#fff5f5;border-color:#f0c0c0}
.bi.berr{background:#fff8f0;border-color:#f0d0a0}
.bdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dok{background:var(--grn)}.ddup{background:var(--red)}.derr{background:#cc8800}
.baddr{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbldg{font-size:11px;color:var(--mut)}
.bcode{font-family:monospace;font-size:12px;background:var(--amb);color:var(--ambt);padding:1px 7px;border-radius:4px;flex-shrink:0}
.btag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tok{background:#dff5df;color:#1a7a1a}.tdup{background:#ffe0e0;color:var(--red)}.terr{background:#fff0cc;color:#885500}
.bst{font-size:13px;color:#555;margin-bottom:10px;line-height:1.7}
.bparse-btn{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:600;font-size:13px;padding:8px 18px;border-radius:9px;margin-top:8px}

/* Guide */
.gs{display:flex;gap:11px;margin-bottom:13px}
.gn{width:24px;height:24px;border-radius:50%;background:var(--bl);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gtt{font-weight:600;font-size:13px;margin-bottom:2px}
.gd{font-size:13px;color:#666;line-height:1.55}
.wb{background:var(--amb);border-radius:9px;padding:10px 13px;font-size:12px;color:var(--ambt);line-height:1.65;margin-bottom:13px}
.apisec{padding-top:13px;border-top:1px solid #f0f0ea;margin-top:4px}
.apist{font-size:11px;margin-top:6px;font-weight:600}
.agood{color:var(--grn)}.abad{color:#c87000}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;z-index:9999;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;white-space:nowrap;font-weight:500}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--red)}

@media(max-width:500px){:root{--sw:var(--swm)}.appname{font-size:14px}.appcnt{font-size:10px}}
</style>
</head>
<body>

<div id="topbar">
  <div class="app-tw">
    <span class="appname">回家之路</span>
    <span class="appcnt" id="hcnt">155件</span>
  </div>
  <div id="sw2">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
    <input type="search" id="si" placeholder="住所・建物名・コード" oninput="onSrch(this.value)" autocomplete="off" spellcheck="false">
  </div>
  <button id="menubtn" onclick="toggleMenu()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>

<div id="dov" onclick="closeMenu()"></div>
<div id="dropmenu">
  <div class="dmi" onclick="menuAct('batch')"><span style="font-size:17px;width:20px;text-align:center">📄</span><span>一括取込</span></div>
  <div class="dmi" onclick="menuAct('export')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>バックアップ（JSON）</span></div>
  <div class="dmi" onclick="menuAct('import')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <span>復元（JSONから）</span></div>
  <div class="dmi" onclick="menuAct('guide')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span>設定 / 機種変更</span></div>
</div>

<div id="body">
  <div id="sidebar">
    <div class="sb-hdr"><span>エリア</span><span class="sb-hint">長押し並替</span></div>
    <div id="alist"></div>
  </div>
  <div id="main"></div>
</div>

<div id="overlay" onclick="bgClick(event)"><div class="oi"><div id="mbox"></div></div></div>
<div id="toast"></div>
<input type="file" id="icam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this.files[0])">
<input type="file" id="ipick" accept="image/*" style="display:none" onchange="handleImg(this.files[0])">
<button onclick="openM('new')" style="position:fixed;bottom:22px;right:16px;z-index:190;background:var(--bl);color:#fff;border:none;border-radius:14px;padding:13px 20px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(24,95,165,.35)">＋ 追加</button>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────────
function toH(s){return(s||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[－ーｰ‐—―−]/g,'-').replace(/\u3000/g,' ').replace(/^東京都/,'').replace(/^墨田区/,'').trim();}
function pA(inp){const s=toH(inp||'');for(const p of[/^(.+?)\s*(\d+)丁目\s*(\d+)-(\d+)$/,/^(.+?)\s*(\d+)丁目\s*(\d+)番地?(\d+)号?$/,/^(.+?)\s+(\d+)-(\d+)-(\d+)$/,/^(.+?)(\d+)-(\d+)-(\d+)$/]){const m=s.match(p);if(m){const[,area,c,b,g]=m;return{area:area.trim(),chome:+c,banchi:+b,go:+g,normalized:`${area.trim()}${c}-${b}-${g}`};}}return{area:s,chome:0,banchi:0,go:0,normalized:s};}
function sRecs(r){return[...r].sort((a,b)=>a.area.localeCompare(b.area,'ja')||a.chome-b.chome||a.banchi-b.banchi||a.go-b.go);}
function stripRm(s){return(s||'').replace(/\s*[-\s]?\d{3,4}(号室?)?$/,'').trim();}
function mkR(raw){const p=pA(raw.raw_addr||'');return{id:raw.id||Date.now(),raw_addr:(raw.raw_addr||'').trim(),building:(raw.building||'').trim(),code:String(raw.code||'').replace(/\.0$/,'').trim(),notes:raw.notes||'',updated:new Date().toISOString().split('T')[0],lastUsed:null,...p};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sM(r,q){return toH([r.raw_addr,r.normalized,r.building,r.code,r.notes].join(' ')).toLowerCase().replace(/\s/g,'').includes(q);}

// ── Storage ────────────────────────────────────────────────────────────────────
const LK='kaerinoie:v2',LA='kaerinoie:apikey',LO='kaerinoie:areaOrder';
let G={records:[],srch:'',area:'all',newId:null,modal:null,eform:null,aiSt:'idle',aiImg:null,batch:[],batchTab:'file'};
function lL(){try{const s=localStorage.getItem(LK);if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length)return sRecs(p);}}catch{}return null;}
function lS(r){try{localStorage.setItem(LK,JSON.stringify(r));}catch{}}
function gKey(){return localStorage.getItem(LA)||'';}
function sKey(k){k?localStorage.setItem(LA,k):localStorage.removeItem(LA);}
function loadOrder(){try{const s=localStorage.getItem(LO);if(s)return JSON.parse(s);}catch{}return[];}
function saveOrder(o){try{localStorage.setItem(LO,JSON.stringify(o));}catch{}}
function getOrderedAreas(){const counts={};G.records.forEach(r=>{counts[r.area]=(counts[r.area]||0)+1;});const all=Object.keys(counts);const ordered=[];G.areaOrder.forEach(a=>{if(counts[a])ordered.push(a);});all.sort((a,b)=>a.localeCompare(b,'ja')).forEach(a=>{if(!ordered.includes(a))ordered.push(a);});if(JSON.stringify(G.areaOrder)!==JSON.stringify(ordered)){G.areaOrder=ordered;saveOrder(ordered);}return{counts,ordered};}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAll(){renderSB();renderMain();}
function renderSB(){
  const {counts,ordered}=getOrderedAreas();
  let h=`<div class="acard${G.area==='all'?' active':''}" onclick="setArea('all')"><div class="ac-name">全て</div><div class="ac-bot"><span class="ac-cnt">${G.records.length}</span></div></div>`;
  ordered.forEach(a=>{const act=G.area===a?' active':'';h+=`<div class="acard${act}" data-area="${esc(a)}" draggable="true" ondragstart="dragStart(event,'${esc(a)}')" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="doDrop(event,'${esc(a)}')" ondragend="dragEnd(event)" onclick="setArea('${esc(a)}')"><div class="ac-name">${esc(a)}</div><div class="ac-bot"><span class="ac-cnt">${counts[a]||0}</span><span class="ac-drag" ontouchstart="touchDS(event,'${esc(a)}')">⠿</span></div></div>`;});
  document.getElementById('alist').innerHTML=h;
  document.getElementById('hcnt').textContent=`${G.records.length}件`;
}
function renderMain(){
  const q=toH(G.srch).toLowerCase().replace(/\s/g,'');
  let list=G.records;
  if(G.area!=='all')list=list.filter(r=>r.area===G.area);
  if(q)list=list.filter(r=>sM(r,q));
  list=sRecs(list);
  if(!list.length){document.getElementById('main').innerHTML=`<div class="empty">${G.srch?'検索結果がありません':'データがありません'}</div>`;return;}
  document.getElementById('main').innerHTML=list.map(r=>{const isN=r.id===G.newId;const bldg=r.building||'<span style="color:#ccc">建物名なし</span>';const nb=isN?'<span class="nb">NEW</span>':'';return`<div class="card${isN?' nc':''}" id="card-${r.id}"><div class="ci">${r.area.charAt(0)||'?'}</div><div class="cb"><div class="ca">${esc(r.normalized)}${nb}</div><div class="cbl">${bldg}</div>${r.notes?`<div class="cn2">${esc(r.notes)}</div>`:''}</div><div class="cr"><div class="code" onclick="cpCode('${esc(r.code)}','${r.id}')">${esc(r.code)}</div><div class="cas"><button class="bx" onclick="cpAddr('${esc(r.normalized)}','${r.id}')">住所</button><button class="bx" onclick="openM('edit',${r.id})">編集</button><button class="bx bxd" onclick="openM('del',${r.id})">削除</button></div></div></div>`;}).join('');
}

// ── Drag ───────────────────────────────────────────────────────────────────────
let _ds=null;
function dragStart(e,a){_ds=a;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragEnd(e){e.currentTarget.classList.remove('dragging','drag-over');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');return false;}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function doDrop(e,t){e.preventDefault();e.currentTarget.classList.remove('drag-over');if(!_ds||_ds===t)return;const o=[...G.areaOrder];const fi=o.indexOf(_ds),ti=o.indexOf(t);if(fi<0||ti<0)return;o.splice(fi,1);o.splice(ti,0,_ds);G.areaOrder=o;saveOrder(o);_ds=null;renderSB();}
let _td=null,_tc=null,_ti2=null,_tt3=null;
function touchDS(e,a){e.stopPropagation();_td=a;const el=e.currentTarget.closest('.acard');_ti2=document.querySelectorAll('.acard[data-area]');_tc=el.cloneNode(true);Object.assign(_tc.style,{position:'fixed',width:el.offsetWidth+'px',opacity:'.7',pointerEvents:'none',zIndex:'9998',borderColor:'var(--bl)',background:'var(--bll)'});document.body.appendChild(_tc);document.addEventListener('touchmove',onTM,{passive:false});document.addEventListener('touchend',onTE);}
function onTM(e){e.preventDefault();const t=e.touches[0];_tc.style.left=(t.clientX-50)+'px';_tc.style.top=(t.clientY-18)+'px';_tt3=null;_ti2.forEach(el=>{el.classList.remove('drag-over');const r=el.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){_tt3=el.dataset.area;el.classList.add('drag-over');}});}
function onTE(){document.removeEventListener('touchmove',onTM);document.removeEventListener('touchend',onTE);if(_tc){_tc.remove();_tc=null;}if(_ti2)_ti2.forEach(el=>el.classList.remove('drag-over'));if(_td&&_tt3&&_td!==_tt3){const o=[...G.areaOrder];const fi=o.indexOf(_td),ti=o.indexOf(_tt3);if(fi>=0&&ti>=0){o.splice(fi,1);o.splice(ti,0,_td);}G.areaOrder=o;saveOrder(o);}_td=null;_tt3=null;renderSB();}

// ── File picker (fresh input each time — fixes "won't fire again" bug) ─────────
function pickFile(accept,multiple,callback){
  const inp=document.createElement('input');inp.type='file';inp.accept=accept;inp.multiple=!!multiple;inp.style.display='none';
  inp.addEventListener('change',()=>{callback([...inp.files]);setTimeout(()=>inp.remove(),1000);});
  inp.addEventListener('cancel',()=>inp.remove());

// ── File parsing ───────────────────────────────────────────────────────────────
function parseBatchFiles(files){
  if(!files||!files.length)return;
  // Show loading state on dropzone
  const dz=document.getElementById('bdz');if(dz)dz.textContent='読み込み中...';
  let all=[],pend=files.length;
  const done=()=>{if(--pend===0)procBatch(all);};
  files.forEach(file=>{
    const name=file.name.toLowerCase();
    if(name.endsWith('.json')){parseJSONFile(file,r=>{all=all.concat(r);done();});}
    else if(name.endsWith('.xlsx')||name.endsWith('.xls')){parseExcelFile(file,r=>{all=all.concat(r);done();});}
    else if(name.endsWith('.csv')||name.endsWith('.tsv')||name.endsWith('.txt')){parseCSVFile(file,r=>{all=all.concat(r);done();});}
    else done();
  });
}

function parseJSONFile(file,cb){
  const r=new FileReader();
  r.onerror=()=>{toast('JSONファイルエラー',true);cb([]);};
  r.onload=e=>{
    try{const raw=JSON.parse(e.target.result);const arr=Array.isArray(raw)?raw:Array.isArray(raw.records)?raw.records:[];
    cb(arr.filter(r=>(r.raw_addr||r.address||r.住所)&&(r.code||r.アクセスコード||r.門禁コード)).map(r=>{
      const addr=r.raw_addr||r.address||r.住所||'';
      const bldg=r.building||r.建物名||r.建物||'';
      const code=String(r.code||r.アクセスコード||r.門禁コード||'').replace(/\.0$/,'');
      const notes=r.notes||r.備考||r.メモ||'';
      return mkR({raw_addr:toH(addr).trim(),building:bldg.trim(),code:code.trim(),notes:notes.trim()});
    }));}catch(e){toast('JSON解析エラー: '+e.message,true);cb([]);}
  };r.readAsText(file,'UTF-8');
}

function parseExcelFile(file,cb){
  // Dynamic XLSX load — only when needed
  const doRead=()=>{
    const r=new FileReader();
    r.onerror=()=>{toast('Excelファイル読み込みエラー',true);cb([]);};
    r.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        let all=[];
        wb.SheetNames.forEach(sn=>{
          try{const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});all=all.concat(rowsToRecs(rows));}catch{}
        });
        cb(all);
      }catch(err){toast('Excel解析エラー: '+err.message,true);cb([]);}
    };r.readAsArrayBuffer(file);
  };
  if(typeof XLSX!=='undefined'){doRead();}
  else{
    // Load XLSX on demand
    const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doRead;s.onerror=()=>{toast('XLSX library failed to load. Try CSV instead.',true);cb([]);};
    document.head.appendChild(s);
  }
}

function parseCSVFile(file,cb){
  const r=new FileReader();
  r.onerror=()=>{toast('CSVファイルエラー',true);cb([]);};
  r.onload=e=>{
    try{
      const text=e.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length){cb([]);return;}
      const sep=text.includes('\t')?'\t':',';
      const hdrs=lines[0].split(sep).map(h=>h.replace(/^["']|["']$/g,'').trim());
      // Check if first row looks like headers (contains Japanese/English keywords) or data
      const isHdr=/住所|address|raw_addr|アクセスコード|code|建物/i.test(hdrs.join(''));
      const dataLines=isHdr?lines.slice(1):lines;
      if(isHdr){
        const rows=dataLines.map(line=>{const vals=splitCSVLine(line,sep);const obj={};hdrs.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;});
        cb(rowsToRecs(rows));
      }else{
        // No header — treat each line as: addr [building] code
        cb(dataLines.map(line=>parseTextLine(line,sep)).filter(Boolean).map(r=>mkR(r)));
      }
    }catch(e){toast('CSV解析エラー: '+e.message,true);cb([]);}
  };r.readAsText(file,'UTF-8');
}

function splitCSVLine(line,sep){const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'||c==="'"){inQ=!inQ;}else if(c===sep&&!inQ){res.push(cur);cur='';}else{cur+=c;}}res.push(cur);return res.map(s=>s.replace(/^["']|["']$/g,'').trim());}

function rowsToRecs(rows){
  return rows.map(row=>{
    const get=(...keys)=>{for(const k of keys){const v=(row[k]||row[k.toLowerCase()]||row[k.toUpperCase()]||'').toString().trim();if(v&&v!=='null'&&v!=='undefined')return v;}return'';};
    const addr=get('raw_addr','住所','address','アドレス','Address','標準地址','原始地址','addr');
    const bldg=get('building','建物名','建物','マンション名','Building','建物名称');
    const code=get('code','アクセスコード','門禁コード','密码','Code','コード','门禁密碼','access_code','accesscode');
    const notes=get('notes','備考','メモ','Notes','Memo','note');
    if(!addr||!code)return null;
    return mkR({raw_addr:toH(addr).trim(),building:bldg.trim(),code:String(code).replace(/\.0$/,'').trim(),notes:notes.trim()});
  }).filter(Boolean);
}

// ── Text paste parser ─────────────────────────────────────────────────────────
// Code pattern: optionally starts with special prefix, then 3-6 digits, optional letter suffix
const CODE_RE=/^[呼※＊\*#＃\?？✳︎×呼出米]?[\d０-９]{3,7}[a-zA-Z呼出]?$|^\*[\d０-９]{3,7}$/;
function isCode(s){return CODE_RE.test(s.replace(/\s/g,''));}

function parseTextLine(line,sep){
  line=(line||'').trim();if(!line)return null;
  let parts;
  if(sep&&sep!==',')parts=line.split(sep).map(s=>s.trim()).filter(Boolean);
  else if(line.includes('\t'))parts=line.split('\t').map(s=>s.trim()).filter(Boolean);
  else if(line.includes(','))parts=line.split(',').map(s=>s.trim()).filter(Boolean);
  else parts=line.split(/\s+/);
  if(parts.length<2)return null;
  // First token should be address
  const addr=parts[0];
  const addrParsed=pA(toH(addr));
  if(!addrParsed.area||addrParsed.chome===0)return null; // not a valid address
  if(parts.length===2){
    // addr + code
    if(isCode(parts[1]))return{raw_addr:toH(addr),building:'',code:parts[1],notes:''};
    // addr + building (no code — skip, can't determine)
    return null;
  }
  // 3+ parts: addr + [building] + code
  // Last part most likely code
  if(isCode(parts[parts.length-1])){
    const code=parts[parts.length-1];
    const building=parts.slice(1,parts.length-1).join(' ');
    return{raw_addr:toH(addr),building:stripRm(building),code,notes:''};
  }
  // Second part could be code, rest building
  if(isCode(parts[1])){
    return{raw_addr:toH(addr),building:stripRm(parts.slice(2).join(' ')),code:parts[1],notes:''};
  }
  return null;
}

function parsePaste(){
  const ta=document.getElementById('paste-area');if(!ta)return;
  const text=ta.value.trim();if(!text){toast('テキストを入力してください',true);return;}
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const recs=[];
  lines.forEach(line=>{const r=parseTextLine(line,null);if(r)recs.push(mkR(r));});
  if(!recs.length){toast('認識できる住所がありませんでした',true);return;}
  procBatch(recs);
}

function procBatch(inc){
  const seen=new Set();
  G.batch=inc.map(rec=>{
    const norm=rec.normalized;
    const ex=G.records.find(r=>r.normalized===norm);
    const self=seen.has(norm);seen.add(norm);
    const isDup=!!(ex||self);
    const isErr=!rec.code;
    const dupWith=ex?(ex.building||ex.normalized):self?'このファイル内に重複':'';
    return{rec,isDup,isErr,dupWith,raw:rec.raw_addr};
  });
  renderM();
}

function doBatch(){
  const toAdd=G.batch.filter(i=>!i.isDup&&!i.isErr).map(i=>i.rec);if(!toAdd.length)return;
  let mx=Math.max(0,...G.records.map(r=>r.id));
  G.records=sRecs([...G.records,...toAdd.map(r=>({...r,id:++mx}))]);
  lS(G.records);closeM();renderAll();toast(`${toAdd.length}件を追加しました`);
}

  <div class="gs"><div class="gn">1</div><div><div class="gtt">旧端末でバックアップ</div><div class="gd">右上メニュー「バックアップ」→ JSONファイルが保存されます。</div></div></div>
  <div class="gs"><div class="gn">2</div><div><div class="gtt">新端末にファイルを転送</div><div class="gd">AirDrop・LINE・メール等でJSONを送ります。</div></div></div>
  <div class="gs"><div class="gn">3</div><div><div class="gtt">新端末で復元</div><div class="gd">このHTMLを開き、右上メニュー「復元」からJSONを選ぶと全データが戻ります。</div></div></div>
  <div class="wb">定期的にバックアップを保存しておくと安心です。ブラウザのデータ消去でデータが消える場合があります。</div>
  <div class="apisec">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">AI画像解析 APIキー</div>
    <input type="password" id="ak" placeholder="sk-ant-..." value="${esc(k)}" style="font-family:monospace;font-size:13px">
    <div style="font-size:11px;color:#999;margin-top:6px;line-height:1.55">Anthropic APIキーを設定するとカメラ撮影でアクセスコードを自動認識できます。<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得。このデバイスにのみ保存されます。</div>
    <div class="apist ${k?'agood':'abad'}" id="apist">${k?'✓ APIキー設定済み':'未設定（AI機能は利用不可）'}</div>
    <div style="margin-top:10px;display:flex;gap:8px">
      <button onclick="svKey()" style="background:var(--bl);color:#fff;border-color:var(--bl);font-weight:600">保存</button>
      <button onclick="clKey()" style="color:var(--red);border-color:#f0c0c0">削除</button>
    </div>
  </div>
  <div class="mf"><button onclick="closeM()">閉じる</button></div>`;
}
function svKey(){const k=(document.getElementById('ak').value||'').trim();sKey(k);const el=document.getElementById('apist');if(el){el.className='apist '+(k?'agood':'abad');el.textContent=k?'✓ 保存しました':'削除しました';}toast(k?'APIキーを保存しました':'削除しました');}
function clKey(){sKey('');const i=document.getElementById('ak');if(i)i.value='';const el=document.getElementById('apist');if(el){el.className='apist abad';el.textContent='未設定';}toast('削除しました');}

// ── AI Image ───────────────────────────────────────────────────────────────────
function handleImg(file){
  if(!file)return;const k=gKey();if(!k){toast('APIキー未設定。設定から入力してください',true);return;}
  G.aiSt='reading';G.aiImg=null;renderM();
  const reader=new FileReader();reader.onload=async e=>{
    const du=e.target.result;G.aiImg=du;G.aiSt='parsing';renderM();
    try{
      const res=await callCl(du.split(',')[1],file.type||'image/jpeg',k);
      Object.assign(G.eform,{raw_addr:res.address||G.eform.raw_addr,building:stripRm(res.building||''),code:res.code||G.eform.code});
      G.aiSt='done';renderM();
      ['fa','fb','fc'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.value=[G.eform.raw_addr,G.eform.building,G.eform.code][i];});
      if(G.eform.raw_addr)onAI(G.eform.raw_addr);
    }catch(err){G.aiSt='error';renderM();toast('AI解析失敗: '+err.message,true);}
  };reader.readAsDataURL(file);
  document.getElementById('icam').value='';document.getElementById('ipick').value='';
}
async function callCl(b64,mt,k){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:`この画像はAmazon配達アプリのスクリーンショットです。JSON形式だけ返してください：\n{"address":"住所（東京都・墨田区除く、例:東向島6-38-3）","building":"建物名のみ（部屋番号絶対含めない）","code":"アクセスコードの値（記号も含む、なければ空）","notes":""}\nアクセスコードは「アクセスコード：」の後の値`}]}]})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();const t=d.content?.map(c=>c.text||'').join('')||'';
  const m=t.match(/\{[\s\S]*\}/);if(!m)throw new Error('JSON not found');return JSON.parse(m[0]);
}
</script>
