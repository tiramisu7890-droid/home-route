<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>回家之路</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--sw:86px;--top:52px;--bg:#f0efe9;--card:#fff;--bdr:#e0dfd5;--txt:#1a1a18;--mut:#8a8a82;--bl:#185FA5;--bll:#eef3fb;--amb:#FAEEDA;--ambt:#633806;--grn:#1D9E75;--red:#cc3333;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--txt);height:100dvh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
button{font-family:inherit;cursor:pointer;border:1px solid var(--bdr);border-radius:8px;background:#fff;color:var(--txt);font-size:12px;padding:6px 11px;white-space:nowrap;line-height:1.4}
button:active{opacity:.65}
input,textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--bdr);border-radius:9px;background:#fff;width:100%;outline:none;color:var(--txt);-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;line-height:1.55}

/* Topbar */
#topbar{height:var(--top);background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:8px;padding:0 10px 0 10px;flex-shrink:0;z-index:60}
.apptw{display:flex;align-items:baseline;gap:4px;flex-shrink:0}
.appname{font-size:14px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.appcnt{font-size:10px;color:var(--mut);white-space:nowrap}
#sw2{flex:1;min-width:0;position:relative}
#sw2 svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--mut);pointer-events:none}
#si{padding:7px 8px 7px 26px;border-radius:9px;background:#f7f7f4;font-size:13px}
#menubtn{width:36px;height:36px;padding:0;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--bdr);background:#fff}
#menubtn.open{background:var(--bll);border-color:var(--bl)}

/* Dropdown */
#dropmenu{display:none;position:fixed;top:var(--top);right:10px;background:#fff;border:1px solid var(--bdr);border-radius:13px;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:9990;min-width:185px;overflow:hidden}
#dropmenu.show{display:block}
.dmi{display:flex;align-items:center;gap:10px;padding:12px 15px;cursor:pointer;font-size:13px;color:var(--txt);border-bottom:1px solid #f0f0ea}
.dmi:last-child{border-bottom:none}
.dmi:hover{background:#f5f5f1}
.dmi svg{width:15px;height:15px;flex-shrink:0;color:var(--mut)}
#dov{display:none;position:fixed;inset:0;z-index:9989}
#dov.show{display:block}

/* Body */
#body{flex:1;display:flex;overflow:hidden}

/* Sidebar */
#sidebar{width:var(--sw);background:#fff;border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;-webkit-user-select:none;user-select:none}
.sb-hdr{padding:7px 7px 5px;font-size:9px;font-weight:700;color:var(--mut);letter-spacing:.07em;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.sb-hint{font-size:8px;font-weight:400;color:#ccc}
#alist{overflow-y:auto;flex:1;padding:4px;display:flex;flex-direction:column;gap:3px;scrollbar-width:none}
#alist::-webkit-scrollbar{display:none}
.acard{border:1.5px solid var(--bdr);border-radius:9px;padding:5px 6px 4px;cursor:pointer;background:#fff;transition:border-color .12s,background .12s;display:flex;flex-direction:column;gap:2px;-webkit-user-select:none;user-select:none}
.acard:hover{border-color:#c0c0b8;background:#fafaf6}
.acard.active{border-color:var(--bl);background:var(--bll)}
.acard.drag-over{border-color:var(--bl);border-style:dashed}
.acard.dragging{opacity:.35}
.ac-name{font-size:11px;font-weight:700;color:var(--txt);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acard.active .ac-name{color:var(--bl)}
.ac-bot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--bdr);padding-top:3px;margin-top:1px}
.acard.active .ac-bot{border-color:#c5d8f0}
.ac-cnt{font-size:13px;font-weight:700;color:var(--mut)}
.acard.active .ac-cnt{color:var(--bl)}
.ac-drag{font-size:15px;color:#c8c8c0;line-height:1;
  -webkit-user-select:none;user-select:none;
  -webkit-touch-callout:none;
  touch-action:none;
  cursor:grab;
  padding:4px 2px;
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  min-width:22px;min-height:22px;}
.acard.active .ac-drag{color:#aac8e8}

/* Main */
#main{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:6px}
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* Cards */
.card{background:var(--card);border-radius:11px;border:1px solid var(--bdr);padding:10px 11px;display:flex;align-items:center;gap:9px}
.card.nc{border-color:var(--bl);border-width:2px;animation:fb 5s ease forwards}
@keyframes fb{0%,50%{border-color:var(--bl);border-width:2px}100%{border-color:var(--bdr);border-width:1px}}
.ci{width:30px;height:30px;border-radius:50%;background:var(--bll);color:var(--bl);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb{flex:1;min-width:0}
.ca{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbl{font-size:12px;color:var(--mut);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cn2{font-size:10px;color:#bbb;margin-top:1px}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.code{font-family:'Courier New',monospace;font-size:15px;font-weight:700;background:var(--amb);color:var(--ambt);padding:4px 10px;border-radius:7px;cursor:pointer;-webkit-user-select:none;user-select:none;letter-spacing:.05em;border:1px solid #f0d8a0}
.cas{display:flex;gap:3px}
.bx{font-size:11px;padding:3px 7px;border-radius:6px;color:#555}
.bxd{color:var(--red);border-color:#f0c0c0}
.nb{font-size:9px;background:#e3f5e1;color:#1a7a1a;border:1px solid #b2dba8;border-radius:4px;padding:1px 5px;font-weight:700;vertical-align:middle;margin-left:4px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}

/* Modal */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
#overlay.show{display:block}
.oi{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:20px 10px}
#mbox{background:#fff;border-radius:18px;padding:18px 18px;max-width:500px;width:100%;margin:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mt{font-size:16px;font-weight:700}
.mx{font-size:20px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#aaa;border-radius:50%}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:4px}
.hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.5}
.dup{font-size:12px;color:var(--red);font-weight:600;margin-top:4px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #f0f0ea}
.bsave{background:var(--bl);color:#fff;border-color:var(--bl);font-weight:700;font-size:14px;padding:9px 22px;border-radius:10px}
.bcancel{color:#666;border-color:#ddd}

/* AI / OCR box */
.aibox{background:#f5f8ff;border:1px solid #c5d5f5;border-radius:11px;padding:11px;margin-bottom:13px}
.ait{font-size:11px;font-weight:700;color:var(--bl);margin-bottom:8px}
.air{display:flex;gap:6px}
.aib{flex:1;padding:8px;border-radius:9px;font-size:12px;font-weight:500;border:1px solid #c5d5f5;background:#fff;color:var(--bl);cursor:pointer}
.aib.cam{background:var(--bl);color:#fff;border-color:var(--bl)}
.aib:disabled{opacity:.4;cursor:default}
.sp{width:14px;height:14px;border:2px solid #c5d5f5;border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ast{display:flex;align-items:center;gap:7px;margin-top:8px;font-size:12px;color:#555}
.aok{font-size:12px;color:var(--grn);font-weight:600;margin-top:7px}
.aerr{font-size:12px;color:var(--red);margin-top:7px}
.ocr-raw-wrap{margin-top:9px}
.ocr-raw-toggle{font-size:11px;color:var(--mut);cursor:pointer;text-decoration:underline;text-decoration-style:dotted;display:inline-block;margin-bottom:5px}
.ocr-raw{font-size:11px;background:#f5f5f0;border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;white-space:pre-wrap;max-height:90px;overflow-y:auto;line-height:1.5;color:#666;font-family:var(--font-mono,monospace)}
.ocr-edit-section{background:#f0f9f0;border:1px solid #b5ddb5;border-radius:9px;padding:10px 11px;margin-top:9px}
.ocr-edit-title{font-size:11px;font-weight:700;color:#1a7a1a;margin-bottom:8px}
.ocr-field{margin-bottom:7px}
.ocr-field label{display:block;font-size:10px;font-weight:600;color:#2a7a3a;margin-bottom:3px;letter-spacing:.03em}
.ocr-field input{font-size:13px;padding:7px 10px;border:1px solid #b5ddb5;border-radius:7px;background:#fff;width:100%;outline:none;font-family:inherit;color:var(--txt)}
.ocr-field input:focus{border-color:#1a7a1a;box-shadow:0 0 0 2px rgba(26,122,26,.1)}
.ocr-field input.has-val{font-weight:600}
.ocr-apply{margin-top:9px;background:#1a7a1a;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.ocr-apply:active{opacity:.8}

/* Sugg */
.sugwrap{border:1px solid var(--bdr);border-radius:9px;margin-top:4px;overflow:hidden}
.sugh{font-size:10px;padding:4px 10px;background:#f8f8f5;color:#bbb;font-weight:600}
.sugr{padding:8px 11px;cursor:pointer;font-size:12px;border-bottom:1px solid #f5f5f0;display:flex;align-items:center;gap:7px}
.sugr:last-child{border-bottom:none}
.sugr:hover{background:#f2f6ff}
.suga{font-weight:600}
.sugb{color:#999;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sugc{font-family:monospace;font-size:11px;background:var(--amb);color:var(--ambt);padding:2px 6px;border-radius:4px;flex-shrink:0}

/* Batch tabs */
.btabs{display:flex;gap:0;margin-bottom:13px;border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.btab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:#f8f8f5;color:var(--mut);border:none;border-radius:0}
.btab.active{background:var(--bl);color:#fff}
.btab:first-child{border-right:1px solid var(--bdr)}

/* File drop zone */
#bdz{border:2px dashed #c8c8c0;border-radius:12px;padding:22px 12px;text-align:center;cursor:pointer;color:var(--mut);font-size:13px;background:#fafaf8;margin-bottom:12px;transition:border-color .15s,background .15s}
#bdz:hover,#bdz.over{border-color:var(--bl);background:var(--bll);color:var(--bl)}
#bdz svg{margin:0 auto 8px;display:block;opacity:.4}
.bfmt{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-top:7px}
.bfmt span{font-size:11px;background:#f0f0ea;color:#888;padding:2px 7px;border-radius:4px}

/* Paste zone */
.bpta{font-size:12px;line-height:1.7;min-height:110px;max-height:180px;overflow-y:auto;border-radius:9px;font-family:inherit;color:var(--txt);background:#fff;padding:9px 11px;border:1px solid var(--bdr);width:100%;resize:vertical}
.bpth{font-size:11px;color:#aaa;margin-top:6px;line-height:1.6}
.bparsebtn{background:var(--bl);color:#fff;border:none;border-radius:9px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px}

/* Batch list */
.bl2{display:flex;flex-direction:column;gap:4px;max-height:240px;overflow-y:auto;margin-bottom:12px}
.bi{display:flex;align-items:center;gap:7px;border-radius:9px;padding:7px 9px;border:1px solid var(--bdr);font-size:12px}
.bi.bok{background:#f3fbf3;border-color:#b5ddb5}
.bi.bdup{background:#fff5f5;border-color:#f0c0c0}
.bi.berr{background:#fff8f0;border-color:#f0d0a0}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dok{background:var(--grn)}.ddup{background:var(--red)}.derr{background:#cc8800}
.baddr{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbldg{font-size:11px;color:var(--mut)}
.bcode{font-family:monospace;font-size:11px;background:var(--amb);color:var(--ambt);padding:1px 6px;border-radius:4px;flex-shrink:0}
.btag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0}
.tok{background:#dff5df;color:#1a7a1a}.tdup{background:#ffe0e0;color:var(--red)}.terr{background:#fff0cc;color:#885500}
.bst{font-size:12px;color:#555;margin-bottom:9px;line-height:1.7}

/* Guide */
.gs{display:flex;gap:10px;margin-bottom:12px}
.gn{width:22px;height:22px;border-radius:50%;background:var(--bl);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gtt{font-weight:600;font-size:13px;margin-bottom:2px}
.gd{font-size:12px;color:#666;line-height:1.55}
.wb{background:var(--amb);border-radius:9px;padding:10px 12px;font-size:11px;color:var(--ambt);line-height:1.65;margin-bottom:12px}
.apisec{padding-top:12px;border-top:1px solid #f0f0ea}
.apist{font-size:11px;margin-top:5px;font-weight:600}
.agood{color:var(--grn)}.abad{color:#c87000}

/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1a18;color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;z-index:9999;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;white-space:nowrap;font-weight:500}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--red)}

/* Text extractor modal */
.ext-ta{font-size:13px;line-height:1.7;min-height:130px;max-height:220px;overflow-y:auto;border-radius:10px;font-family:inherit;color:var(--txt);background:#fff;padding:10px 12px;border:1px solid var(--bdr);width:100%;resize:vertical}
.ext-ta:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.ext-hint{font-size:11px;color:var(--mut);margin-top:5px;line-height:1.5}
.ext-run{background:var(--bl);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.ext-run:disabled{opacity:.45;cursor:default}
.ext-result{background:#f5fff8;border:1px solid #b5ddb5;border-radius:10px;padding:12px 13px;margin-top:13px}
.ext-result-title{font-size:11px;font-weight:700;color:#1a7a1a;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.ext-f{margin-bottom:8px}
.ext-f label{display:block;font-size:10px;font-weight:700;color:#2a7a3a;margin-bottom:3px;letter-spacing:.03em}
.ext-f input{font-size:14px;padding:8px 11px;border:1px solid #b5ddb5;border-radius:8px;background:#fff;width:100%;outline:none;font-family:inherit;color:var(--txt)}
.ext-f input:focus{border-color:#1a7a1a;box-shadow:0 0 0 2px rgba(26,122,26,.1)}
.ext-f input.code-inp{font-family:monospace;font-size:17px;font-weight:700;letter-spacing:.06em}
.ext-send{background:#1a7a1a;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
.ext-err{font-size:12px;color:var(--red);margin-top:9px;background:#fff5f5;border:1px solid #f0c0c0;border-radius:8px;padding:9px 11px;line-height:1.5}
.ext-nokey{font-size:12px;color:#c87000;background:#fffaf0;border:1px solid #f0d890;border-radius:8px;padding:9px 11px;margin-top:9px;line-height:1.6}
.ext-nokey a{color:var(--bl);text-decoration:none}

@media(max-width:420px){:root{--sw:72px}}
</style>
</head>
<body>

<div id="topbar">
  <div class="apptw">
    <span class="appname">回家之路</span>
    <span class="appcnt" id="hcnt"></span>
  </div>
  <div id="sw2">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
    <input type="search" id="si" placeholder="住所・建物名・コード" oninput="onSrch(this.value)" autocomplete="off" spellcheck="false">
  </div>
  <button id="menubtn" onclick="toggleMenu()">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</div>

<div id="dov" onclick="closeMenu()"></div>
<div id="dropmenu">
  <div class="dmi" onclick="menuAct('batch')"><span style="font-size:16px;width:18px;text-align:center">📄</span><span>一括取込</span></div>
  <div class="dmi" onclick="menuAct('export')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span>バックアップ</span></div>
  <div class="dmi" onclick="menuAct('import')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg><span>復元（JSON）</span></div>
  <div class="dmi" onclick="menuAct('guide')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>設定 / 機種変更</span></div>
</div>

<div id="body">
  <div id="sidebar">
    <div class="sb-hdr"><span>エリア</span><span class="sb-hint">長押並替</span></div>
    <div id="alist"></div>
  </div>
  <div id="main"></div>
</div>

<div id="overlay" onclick="bgClick(event)"><div class="oi"><div id="mbox"></div></div></div>
<div id="toast"></div>
<!-- File inputs for OCR -->
<input type="file" id="icam" accept="image/*" capture="environment" style="display:none">
<input type="file" id="ocrpick" accept="image/*" style="display:none">
<!-- Floating action buttons -->
<div style="position:fixed;bottom:20px;right:14px;z-index:190;display:flex;flex-direction:column;align-items:flex-end;gap:10px">
  <button onclick="openM('extract')" title="テキスト抽出" style="width:46px;height:46px;border-radius:50%;background:#fff;border:1.5px solid var(--bdr);box-shadow:0 2px 10px rgba(0,0,0,.12);font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--bl)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
  </button>
  <button onclick="openM('new')" style="background:var(--bl);color:#fff;border:none;border-radius:14px;padding:12px 18px;font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(24,95,165,.35)">＋ 追加</button>
</div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────────
function toH(s){return(s||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[－ーｰ‐—―−]/g,'-').replace(/\u3000/g,' ').replace(/^東京都/,'').replace(/^墨田区/,'').trim();}
function pA(inp){const s=toH(inp||'');for(const p of[/^(.+?)\s*(\d+)丁目\s*(\d+)-(\d+)$/,/^(.+?)\s*(\d+)丁目\s*(\d+)番地?(\d+)号?$/,/^(.+?)\s+(\d+)-(\d+)-(\d+)$/,/^(.+?)(\d+)-(\d+)-(\d+)$/]){const m=s.match(p);if(m){const[,area,c,b,g]=m;return{area:area.trim(),chome:+c,banchi:+b,go:+g,normalized:`${area.trim()}${c}-${b}-${g}`};}}return{area:s,chome:0,banchi:0,go:0,normalized:s};}
function sRecs(r){return[...r].sort((a,b)=>a.area.localeCompare(b.area,'ja')||a.chome-b.chome||a.banchi-b.banchi||a.go-b.go);}
function stripRm(s){return(s||'').replace(/\s*[-\s]?\d{3,4}(号室?)?$/,'').trim();}
function mkR(raw){const p=pA(raw.raw_addr||'');return{id:raw.id||Date.now(),raw_addr:(raw.raw_addr||'').trim(),building:(raw.building||'').trim(),code:String(raw.code||'').replace(/\.0$/,'').trim(),notes:raw.notes||'',updated:new Date().toISOString().split('T')[0],lastUsed:null,...p};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sM(r,q){return toH([r.raw_addr,r.normalized,r.building,r.code,r.notes].join(' ')).toLowerCase().replace(/\s/g,'').includes(q);}

function lS(r){try{localStorage.setItem(LK,JSON.stringify(r));}catch{}}
function gKey(){return localStorage.getItem(LA)||'';}
function sKey(k){k?localStorage.setItem(LA,k):localStorage.removeItem(LA);}

function toggleMenu(){const dm=document.getElementById('dropmenu'),dov=document.getElementById('dov'),btn=document.getElementById('menubtn');const open=dm.classList.contains('show');if(open)closeMenu();else{dm.classList.add('show');dov.classList.add('show');btn.classList.add('open');}}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAll(){renderSB();renderMain();}
function renderSB(){
  const {c,o}=getOA();
  let h=`<div class="acard${G.area==='all'?' active':''}" onclick="setArea('all')"><div class="ac-name">全て</div><div class="ac-bot"><span class="ac-cnt">${G.records.length}</span></div></div>`;
  o.forEach(a=>{const act=G.area===a?' active':'';h+=`<div class="acard${act}" data-area="${esc(a)}" draggable="true" ondragstart="dgs(event,'${esc(a)}')" ondragover="dgo(event)" ondragleave="dgl(event)" ondrop="dgd(event,'${esc(a)}')" ondragend="dge(event)" onclick="setArea('${esc(a)}')"><div class="ac-name">${esc(a)}</div><div class="ac-bot"><span class="ac-cnt">${c[a]||0}</span><span class="ac-drag" id="drag-${esc(a)}">⠿</span></div></div>`;});
  document.getElementById('alist').innerHTML=h;
  document.getElementById('hcnt').textContent=`${G.records.length}件`;
  // Attach touch handlers after render
  o.forEach(a=>{const el=document.getElementById('drag-'+a);if(el)el.addEventListener('touchstart',e=>touchDS(e,a),{passive:false});});
}
function renderMain(){
  const q=toH(G.srch).toLowerCase().replace(/\s/g,'');
  let list=G.records;if(G.area!=='all')list=list.filter(r=>r.area===G.area);if(q)list=list.filter(r=>sM(r,q));list=sRecs(list);
  if(!list.length){document.getElementById('main').innerHTML=`<div class="empty">${G.srch?'検索結果がありません':'データがありません'}</div>`;return;}
  document.getElementById('main').innerHTML=list.map(r=>{const isN=r.id===G.newId;const bldg=r.building||'<span style="color:#ccc">建物名なし</span>';const nb=isN?'<span class="nb">NEW</span>':'';return`<div class="card${isN?' nc':''}" id="card-${r.id}"><div class="ci">${r.area.charAt(0)||'?'}</div><div class="cb"><div class="ca">${esc(r.normalized)}${nb}</div><div class="cbl">${bldg}</div>${r.notes?`<div class="cn2">${esc(r.notes)}</div>`:''}</div><div class="cr"><div class="code" onclick="cpCode('${esc(r.code)}','${r.id}')">${esc(r.code)}</div><div class="cas"><button class="bx" onclick="cpAddr('${esc(r.normalized)}','${r.id}')">住所</button><button class="bx" onclick="openM('edit',${r.id})">編集</button><button class="bx bxd" onclick="openM('del',${r.id})">削除</button></div></div></div>`;}).join('');
}

function dgs(e,a){_ds=a;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dge(e){e.currentTarget.classList.remove('dragging','drag-over');}

// ── Drag (touch) — drag handle only, no text selection ────────────────────────
let _td=null,_tc=null,_ti=null,_tt=null;
function touchDS(e,a){
  e.preventDefault();e.stopPropagation();  // prevent long-press menu
  _td=a;
  const card=e.currentTarget.closest('.acard');
  _ti=document.querySelectorAll('#alist .acard[data-area]');
  _tc=card.cloneNode(true);
  const r=card.getBoundingClientRect();
  Object.assign(_tc.style,{position:'fixed',left:r.left+'px',top:r.top+'px',width:r.width+'px',opacity:'.75',pointerEvents:'none',zIndex:'9998',borderColor:'var(--bl)',background:'var(--bll)',margin:'0',boxSizing:'border-box'});
  document.body.appendChild(_tc);
  document.addEventListener('touchmove',onTM,{passive:false});
  document.addEventListener('touchend',onTE,{once:true});
}
function onTM(e){
  e.preventDefault();
  const t=e.touches[0];
  _tc.style.left=(t.clientX-parseInt(_tc.style.width)/2)+'px';
  _tc.style.top=(t.clientY-20)+'px';
  _tt=null;
  _ti.forEach(el=>{el.classList.remove('drag-over');const r=el.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){_tt=el.dataset.area;el.classList.add('drag-over');}});
}
function onTE(){
  document.removeEventListener('touchmove',onTM);
  if(_tc){_tc.remove();_tc=null;}
  if(_ti)_ti.forEach(el=>el.classList.remove('drag-over'));
  if(_td&&_tt&&_td!==_tt){const o=[...G.areaOrder];const fi=o.indexOf(_td),ti=o.indexOf(_tt);if(fi>=0&&ti>=0){o.splice(fi,1);o.splice(ti,0,_td);}G.areaOrder=o;saveOrder(o);}
  _td=null;_tt=null;renderSB();
}

// ── Local OCR (Tesseract.js v4) ────────────────────────────────────────────────
function loadTesseract(){
  return new Promise((res,rej)=>{
    if(window.Tesseract){res();return;}
    const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/tesseract.js@4.1.4/dist/tesseract.min.js';
    s.onload=()=>res();s.onerror=()=>rej(new Error('OCRライブラリの読み込みに失敗。オンライン状態を確認してください'));document.head.appendChild(s);
  });
}
async function handleOCRImg(file){
  if(!file)return;
  G.ocrSt='loading';G.ocrText='';G.ocrParsed=null;renderM();
  try{
    await loadTesseract();
    G.ocrSt='running';renderM();
    // v4 convenience API — auto-manages worker, downloads jpn lang data (~20MB, first run only)
    const {data:{text}}=await Tesseract.recognize(file,'jpn',{logger:()=>{}});
    G.ocrText=text.trim();
    G.ocrParsed=parseOCRText(G.ocrText);
    G.ocrSt='done';renderM();
  }catch(err){G.ocrSt='error';renderM();toast('OCR失敗: '+(err.message||'不明なエラー'),true);}
}
function toggleRaw(el){
  const raw=el.nextElementSibling;
  const shown=raw.style.display!=='none';
  raw.style.display=shown?'none':'block';
  el.textContent=(shown?'▶':'▼')+' OCR生テキストを表示（確認用）';
}
function parseOCRText(text){
  // Keep originals for keyword detection; toH converts ー→- which breaks アクセスコード matching
  const origLines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let address='',building='',code='';
  let nextLineIsCode=false;

  for(let i=0;i<origLines.length;i++){
    const orig=origLines[i];
    const norm=toH(orig);

    // 1a. Label alone on line — check ORIG to keep ー intact
    if(!code&&/^(?:アクセスコード|access\s*code)\s*[：:＊]?\s*$/i.test(orig)){
      nextLineIsCode=true;continue;
    }
    // 1b. Next-line is the code value
    if(nextLineIsCode){
      nextLineIsCode=false;
      const v=norm.replace(/\s/g,'');
      if(v)code=v;
      continue;
    }
    // 1c. Label + value on same line — check ORIG for keyword
    const cm=orig.match(/(?:アクセスコード|access\s*code)\s*[：:\s]\s*(\S{2,})/i);
    if(cm&&!code){code=toH(cm[1]).replace(/^[：:]/,'').trim();continue;}

    // 2. Standalone code line (use norm for digit matching)
    const cl=norm.replace(/\s/g,'');
    if(!code&&/^[呼#＃\*\?✳×]?[\d]{3,7}[a-zA-Z呼]?$/.test(cl)&&cl.length<=9){
      code=cl;continue;
    }

    // 3. Address (use norm for number normalization, strip room number)
    const stripped=norm.replace(/^(東京都|墨田区)/,'');
    const am=stripped.match(/^([^\s\d]{1,6})\s*(\d+)\s*[-]\s*(\d+)\s*[-]\s*(\d+)/);
    if(am&&!address){
      address=`${am[1].trim()}${am[2]}-${am[3]}-${am[4]}`;
      continue;
    }
    const am2=stripped.match(/^([^\s\d]{1,6})\s*(\d+)丁目\s*(\d+)[-番]\s*(\d+)/);
    if(am2&&!address){
      address=`${am2[1].trim()}${am2[2]}-${am2[3]}-${am2[4]}`;
      continue;
    }

    // 4. Building: after address, check ORIG for skip keywords
    if(address&&!building&&orig.length>=3&&!/^[\d呼#＃\*]/.test(orig)){
      if(!/(?:配達|受取|不在|在宅|荷物|注意|設定|住所を|場所を|翻訳|メモ|宅配|DA\d|\d{10,})/.test(orig)){
        building=stripRm(orig);
      }
    }
  }
  return{address,building,code};
}

  const pasteContent=`<textarea id="paste-ta" class="bpta" placeholder="東向島6-38-3 アイルイムーブル向島 5140&#10;向島3-6-10 メゾンtmd 呼5963&#10;押上1-45-7 スカイツリープレイス 0204"></textarea><div class="bpth">1行1件：住所　建物名　コード（スペース/カンマ区切り）<br>建物名がない場合：住所　コード</div><button class="bparsebtn" onclick="parsePaste()">内容を解析する</button>`;

// ── KEY FIX: fresh input every time, proper cleanup ────────────────────────────
function setupBatchDrop(){
  const dz=document.getElementById('bdz');if(!dz)return;
  dz.onclick=()=>{
    // Create brand new input element — never reuse
    const inp=document.createElement('input');inp.type='file';inp.accept='.json,.xlsx,.xls,.csv,.tsv,.txt';inp.multiple=true;inp.style.display='none';
    inp.addEventListener('change',function(){parseBatchFiles([...this.files]);this.remove();},{once:true});
    document.body.appendChild(inp);inp.click();
  };
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');parseBatchFiles([...e.dataTransfer.files]);});
}

function parseBatchFiles(files){
  if(!files||!files.length){toast('ファイルが選択されていません',true);return;}
  const dz=document.getElementById('bdz');if(dz)dz.innerHTML='<div style="padding:8px 0;color:var(--mut)">読み込み中...</div>';
  let all=[],pend=files.length;
  const done=()=>{if(--pend===0)procBatch(all);};
  files.forEach(file=>{
    const name=(file.name||'').toLowerCase();
    if(name.endsWith('.json'))parseJSONFile(file,r=>{all=all.concat(r);done();});
    else if(name.endsWith('.xlsx')||name.endsWith('.xls'))parseExcelFile(file,r=>{all=all.concat(r);done();});
    else if(name.endsWith('.csv')||name.endsWith('.tsv')||name.endsWith('.txt'))parseCSVFile(file,r=>{all=all.concat(r);done();});
    else{toast(`${file.name}: 非対応フォーマット`,true);done();}
  });
}

function parseJSONFile(file,cb){
  const r=new FileReader();r.onerror=()=>{toast('JSON読み込みエラー',true);cb([]);};
  r.onload=e=>{
    try{
      const raw=JSON.parse(e.target.result);
      const arr=Array.isArray(raw)?raw:Array.isArray(raw.records)?raw.records:[];
      const recs=arr.filter(r=>{
        const addr=r.raw_addr||r.address||r.住所||'';
        const code=r.code||r.アクセスコード||r.門禁コード||'';
        return addr&&code;
      }).map(r=>mkR({raw_addr:toH(r.raw_addr||r.address||r.住所||''),building:(r.building||r.建物名||r.建物||'').trim(),code:String(r.code||r.アクセスコード||r.門禁コード||'').replace(/\.0$/,'').trim(),notes:(r.notes||r.備考||r.メモ||'').trim()}));
      cb(recs);
    }catch(err){toast('JSON解析エラー: '+err.message,true);cb([]);}
  };r.readAsText(file,'UTF-8');
}

function parseExcelFile(file,cb){
  const doRead=()=>{
    const r=new FileReader();r.onerror=()=>{toast('Excel読み込みエラー',true);cb([]);};
    r.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        let all=[];
        wb.SheetNames.forEach(sn=>{try{const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:'',raw:false});all=all.concat(rowsToRecs(rows));}catch{}});
        if(!all.length){toast('Excelから有効なデータが見つかりません。列名を確認してください。',true);}
        cb(all);
      }catch(err){toast('Excel解析エラー: '+err.message,true);cb([]);}
    };r.readAsArrayBuffer(file);
  };
  if(typeof XLSX!=='undefined'){doRead();}
  else{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.onload=doRead;s.onerror=()=>{toast('XLSXライブラリの読み込みに失敗しました。CSVでお試しください。',true);cb([]);};document.head.appendChild(s);}
}

function parseCSVFile(file,cb){
  const r=new FileReader();r.onerror=()=>{toast('CSV読み込みエラー',true);cb([]);};
  r.onload=e=>{
    try{
      const text=e.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length){cb([]);return;}
      const sep=text.includes('\t')?'\t':',';
      const hdrs=lines[0].split(sep).map(h=>h.replace(/^["']/,'').replace(/["']$/,'').trim());
      const isHdr=/住所|address|raw_addr|アクセスコード|code|建物/i.test(hdrs.join(''));
      if(isHdr){const rows=lines.slice(1).map(line=>{const vals=csvSplit(line,sep);const obj={};hdrs.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;});cb(rowsToRecs(rows));}
      else{cb(lines.map(l=>parseTxtLine(l)).filter(Boolean).map(r=>mkR(r)));}
    }catch(err){toast('CSV解析エラー: '+err.message,true);cb([]);}
  };r.readAsText(file,'UTF-8');
}
function csvSplit(line,sep){const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'||c==="'"){inQ=!inQ;}else if(c===sep&&!inQ){res.push(cur.trim());cur='';}else{cur+=c;}}res.push(cur.trim());return res;}
function rowsToRecs(rows){return rows.map(row=>{const g=(...ks)=>{for(const k of ks){const v=(row[k]||row[k.toLowerCase()]||row[k.toUpperCase()]||'').toString().trim();if(v&&v!=='null'&&v!=='undefined')return v;}return'';};const addr=g('raw_addr','住所','address','アドレス','Address','標準地址','原始地址','addr');const bldg=g('building','建物名','建物','マンション名','Building');const code=g('code','アクセスコード','門禁コード','密码','Code','コード','门禁密碼','access_code');const notes=g('notes','備考','メモ','Notes','Memo');if(!addr||!code)return null;return mkR({raw_addr:toH(addr),building:stripRm(bldg),code:String(code).replace(/\.0$/,'').trim(),notes:notes.trim()});}).filter(Boolean);}

// Paste tab
const CODE_RE=/^[呼※＊\*#＃\?✳×]?[\d０-９]{3,7}[a-zA-Z呼]?$|^\*[\d０-９]{3,7}$/;
function isCode(s){return CODE_RE.test((s||'').replace(/\s/g,''));}
function parseTxtLine(line){
  line=(line||'').trim();if(!line)return null;
  let parts;
  if(line.includes('\t'))parts=line.split('\t').map(s=>s.trim()).filter(Boolean);
  else if(line.includes(','))parts=line.split(',').map(s=>s.trim()).filter(Boolean);
  else parts=line.split(/\s+/);
  if(parts.length<2)return null;
  const addr=parts[0];const ap=pA(toH(addr));
  if(!ap.area||ap.chome===0)return null;
  if(parts.length===2){if(isCode(parts[1]))return{raw_addr:toH(addr),building:'',code:parts[1],notes:''};return null;}
  if(isCode(parts[parts.length-1])){const code=parts[parts.length-1];const building=parts.slice(1,parts.length-1).join(' ');return{raw_addr:toH(addr),building:stripRm(building),code,notes:''};}
  if(isCode(parts[1]))return{raw_addr:toH(addr),building:stripRm(parts.slice(2).join(' ')),code:parts[1],notes:''};
  return null;
}
function parsePaste(){const ta=document.getElementById('paste-ta');if(!ta)return;const text=ta.value.trim();if(!text){toast('テキストを入力してください',true);return;}const lines=text.split(/\r?\n/).filter(l=>l.trim());const recs=lines.map(l=>parseTxtLine(l)).filter(Boolean).map(r=>mkR(r));if(!recs.length){toast('認識できる住所がありません',true);return;}procBatch(recs);}

function procBatch(inc){
  const seen=new Set();
  G.batch=inc.map(rec=>{const norm=rec.normalized;const ex=G.records.find(r=>r.normalized===norm);const self=seen.has(norm);seen.add(norm);const isDup=!!(ex||self);const isErr=!rec.code;const dupWith=ex?(ex.building||ex.normalized):self?'このファイル内に重複':'';return{rec,isDup,isErr,dupWith,raw:rec.raw_addr};});
  renderM();
}
function doBatch(){const toAdd=G.batch.filter(i=>!i.isDup&&!i.isErr).map(i=>i.rec);if(!toAdd.length)return;let mx=Math.max(0,...G.records.map(r=>r.id));G.records=sRecs([...G.records,...toAdd.map(r=>({...r,id:++mx}))]);lS(G.records);closeM();renderAll();toast(`${toAdd.length}件を追加しました`);}

// ── Text Extractor Modal ───────────────────────────────────────────────────────
function bldExtract(){
  const st=G.extSt;const res=G.extResult;const key=gKey();
  // Result section
  let resultHtml='';
  if(st==='running'){
    resultHtml=`<div style="display:flex;align-items:center;gap:8px;margin-top:13px;font-size:13px;color:var(--mut)"><div class="sp" style="border-color:#c5d5f5;border-top-color:var(--bl)"></div>Claude が抽出中...</div>`;
  }else if(st==='done'&&res){
    resultHtml=`<div class="ext-result">
      <div class="ext-result-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a7a1a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        抽出完了 — 修正してから追加できます
      </div>
      <div class="ext-f"><label>住所</label><input id="ext-addr" value="${esc(res.address||'')}" placeholder="見つかりませんでした"></div>
      <div class="ext-f"><label>マンション名（任意）</label><input id="ext-bldg" value="${esc(res.building||'')}" placeholder="なければ空欄"></div>
      <div class="ext-f"><label>アクセスコード</label><input id="ext-code" value="${esc(res.access_code||'')}" placeholder="見つかりませんでした" class="code-inp"></div>
      <button class="ext-send" onclick="sendExtractToForm()">↓ 新規追加フォームに送る</button>
    </div>`;
  }else if(st==='error'){
    resultHtml=`<div class="ext-err">${esc(G.extErrMsg||'抽出に失敗しました。再試行してください。')}</div>`;
  }
  // API key warning
  const keyWarn=!key?`<div class="ext-nokey">APIキー未設定のため Claude 抽出は利用できません。<br><a href="#" onclick="closeM();openM('guide')">設定</a>からAnthropicのAPIキーを入力してください。<br><span style="font-size:11px;color:#888">キーなしでも下のローカル解析ボタンで試せます。</span></div>`:'';
  const busy=st==='running';
  return`<div class="mh">
    <div class="mt">テキスト抽出</div>
    <button class="mx" onclick="closeM()">×</button>
  </div>
  <p style="font-size:12px;color:var(--mut);margin-bottom:10px;line-height:1.6">OCR結果やアプリ画面のコピーテキストを貼り付けると、住所とアクセスコードを自動で抽出します。</p>
  <textarea id="ext-text" class="ext-ta" placeholder="ここにテキストを貼り付けてください&#10;&#10;例：&#10;墨田区東向島6-38-3&#10;アイルイムーブル向島506&#10;アクセスコード：5140"></textarea>
  <div class="ext-hint">Amazon配達アプリの画面テキスト、OCR結果など何でも可</div>
  ${keyWarn}
  <button class="ext-run" ${busy||!key?'disabled':''} onclick="runExtract()">${busy?'抽出中...':'Claude で抽出する'}</button>
  ${!key?`<button class="ext-run" style="margin-top:7px;background:#2a7a3a;border-color:#2a7a3a;" ${busy?'disabled':''} onclick="runExtractLocal()">ローカル解析で試す（精度低め）</button>`:''}
  ${resultHtml}`;
}

async function runExtract(){
  const text=(document.getElementById('ext-text')?.value||'').trim();
  if(!text){toast('テキストを入力してください',true);return;}
  const key=gKey();if(!key){toast('APIキー未設定',true);return;}
  G.extSt='running';G.extResult=null;G.extErrMsg='';renderM();
  try{
    const prompt=`请从以下文字中提取「住所」「マンション名」「アクセスコード」，按固定格式输出。
规则：
* 只抽取，不解释
* 「住所」：日本地址，去掉「東京都」「墨田区」等前置词，格式如「向島3-26-10」。若末尾有房间号（如-502），删除房间号
* 「マンション名」：建物名称，不含房间号。例如「アイ・ステージ向島」。若无则空字符串
* 「アクセスコード」：「アクセスコード」或「アクセスコード:」后面的值，可能在下一行。包含「呼」「#」「*」等前缀符号。若无则空字符串
* 不要补充不存在的信息
仅输出 JSON，无其他文字：
{"address":"","building":"","access_code":""}

文字内容：
${text}`;
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${res.status}`);}
    const data=await res.json();
    const txt=data.content?.map(c=>c.text||'').join('')||'';
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m)throw new Error('JSONが返されませんでした');
    const parsed=JSON.parse(m[0]);
    // Clean up address
    if(parsed.address)parsed.address=toH(parsed.address).replace(/^(東京都|墨田区)/,'').trim();
    G.extResult=parsed;G.extSt='done';renderM();
  }catch(err){
    G.extSt='error';G.extErrMsg=err.message||'不明なエラー';renderM();
  }
}

function runExtractLocal(){
  const text=(document.getElementById('ext-text')?.value||'').trim();
  if(!text){toast('テキストを入力してください',true);return;}
  const parsed=parseOCRText(text);
  G.extResult={address:parsed.address||'',building:parsed.building||'',access_code:parsed.code||''};
  G.extSt='done';renderM();
}

function sendExtractToForm(){
  const addr=(document.getElementById('ext-addr')?.value||'').trim();
  const bldg=stripRm(document.getElementById('ext-bldg')?.value||'');
  const code=(document.getElementById('ext-code')?.value||'').trim();
  closeM();
  G.eform={raw_addr:addr,building:bldg,code,notes:'',id:null};
  G.modal='new';G.ocrSt='idle';G.ocrText='';G.ocrParsed=null;
  renderM();document.getElementById('overlay').className='show';
  if(addr){setTimeout(()=>{const fa=document.getElementById('fa');if(fa){fa.value=addr;onAI(addr);}},50);}
}

function bldGuide(){const k=gKey();return`<div class="mh"><div class="mt">設定 / 機種変更</div><button class="mx" onclick="closeM()">×</button></div><div class="gs"><div class="gn">1</div><div><div class="gtt">旧端末でバックアップ</div><div class="gd">右上メニュー「バックアップ」→ JSONファイルが保存されます。</div></div></div><div class="gs"><div class="gn">2</div><div><div class="gtt">新端末にファイルを転送</div><div class="gd">AirDrop・LINE・メール等でJSONを送ります。</div></div></div><div class="gs"><div class="gn">3</div><div><div class="gtt">新端末で復元</div><div class="gd">このHTMLを開き、右上メニュー「復元」からJSONを選ぶと全データが戻ります。</div></div></div><div class="wb">定期的にバックアップを保存しておくと安心です。ブラウザのデータ消去でデータが消える場合があります。</div><div style="padding-top:12px;border-top:1px solid #f0f0ea;margin-bottom:14px"><div style="font-size:13px;font-weight:700;margin-bottom:6px">テキスト抽出 APIキー</div><input type="password" id="ak" placeholder="sk-ant-..." value="${esc(k)}" style="font-family:monospace;font-size:13px"><div style="font-size:11px;color:#999;margin-top:5px;line-height:1.55">右下の📋ボタンのClaude抽出に使用します。<a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> で取得。このデバイスにのみ保存されます。</div><div style="font-size:11px;margin-top:5px;font-weight:600;${k?'color:#1D9E75':'color:#c87000'}" id="apist">${k?'✓ APIキー設定済み':'未設定（ローカル解析は引き続き利用可）'}</div><div style="margin-top:9px;display:flex;gap:7px"><button onclick="svKey()" style="background:var(--bl);color:#fff;border-color:var(--bl);font-weight:600">保存</button><button onclick="clKey()" style="color:var(--red);border-color:#f0c0c0">削除</button></div></div><div style="padding-top:12px;border-top:1px solid #f0f0ea"><div style="font-size:13px;font-weight:700;margin-bottom:6px">写真OCRについて</div><div style="font-size:12px;color:#666;line-height:1.65">「新規追加」の写真OCR機能はGitHub Pages等にデプロイした場合に利用できます。初回はOCR言語データ（約20MB）をダウンロードするため時間がかかります。APIキーは不要です。</div></div><div class="mf"><button onclick="closeM()">閉じる</button></div>`;}
function svKey(){const k=(document.getElementById('ak').value||'').trim();sKey(k);const el=document.getElementById('apist');if(el){el.style.color=k?'#1D9E75':'#c87000';el.textContent=k?'✓ 保存しました':'削除しました';}toast(k?'APIキーを保存しました':'削除しました');}
function clKey(){sKey('');const i=document.getElementById('ak');if(i)i.value='';const el=document.getElementById('apist');if(el){el.style.color='#c87000';el.textContent='未設定';}toast('削除しました');}
</script>
