<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>回家之路</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --side:176px;--top:54px;
  --bg:#f0efe9;--card:#fff;--border:#e0dfd5;
  --text:#1a1a18;--muted:#8a8a82;
  --blue:#185FA5;--blue-lt:#eef3fb;--blue-d:#0d4a82;
  --amber:#FAEEDA;--amber-t:#633806;
  --green:#1D9E75;--red:#cc3333;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;display:flex;flex-direction:column;font-size:14px}
button{font-family:inherit;cursor:pointer;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);font-size:12px;padding:6px 11px;white-space:nowrap;line-height:1.4}
button:active{opacity:.65}
input,textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:#fff;width:100%;outline:none;color:var(--text);-webkit-appearance:none}
input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
textarea{resize:vertical;line-height:1.55}

/* ── Topbar ── */
#topbar{height:var(--top);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;z-index:60}
.appname{font-size:16px;font-weight:700;letter-spacing:-.3px;white-space:nowrap}
.appcnt{font-size:11px;color:var(--muted);white-space:nowrap;margin-left:2px}
#sw{flex:1;min-width:0;position:relative}
#sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted);pointer-events:none}
#si{padding:8px 10px 8px 28px;border-radius:9px;background:#f7f7f4;font-size:14px}
.tbts{display:flex;gap:5px;flex-shrink:0}
.btnp{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;font-size:13px;padding:7px 14px}

/* ── Layout ── */
#body{flex:1;display:flex;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:var(--side);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;user-select:none}
.sb-hdr{padding:10px 10px 8px;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-hdr-hint{font-size:9px;font-weight:400;color:#bbb;letter-spacing:0}
#area-list{overflow-y:auto;flex:1;padding:8px 8px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin}
#area-list::-webkit-scrollbar{width:3px}
#area-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}

/* Area card */
.acard{border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;cursor:pointer;background:#fff;transition:border-color .12s,background .12s;position:relative;display:flex;flex-direction:column;gap:3px}
.acard:hover{border-color:#c0c0b8;background:#fafaf7}
.acard.active{border-color:var(--blue);background:var(--blue-lt)}
.acard.drag-over{border-color:var(--blue);border-style:dashed;background:#f0f5ff}
.acard.dragging{opacity:.4}
.acard-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.2}
.acard.active .acard-name{color:var(--blue)}
.acard-row{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:4px;margin-top:1px}
.acard.active .acard-row{border-color:#c0d4f0}
.acard-cnt{font-size:15px;font-weight:700;color:var(--blue);line-height:1}
.acard:not(.active) .acard-cnt{color:var(--muted)}
.acard-drag{font-size:12px;color:#ccc;cursor:grab;padding:1px 2px;line-height:1;touch-action:none}
.acard-drag:active{cursor:grabbing}
.acard.active .acard-drag{color:#a0c0e8}

/* Main */
#main{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
#main::-webkit-scrollbar{width:4px}
#main::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}

/* Cards */
.card{background:var(--card);border-radius:12px;border:1px solid var(--border);padding:11px 13px;display:flex;align-items:center;gap:10px}
.card.nc{border-color:var(--blue);border-width:2px;animation:fb 5s ease forwards}
@keyframes fb{0%,50%{border-color:var(--blue);border-width:2px}100%{border-color:var(--border);border-width:1px}}
.ci{width:34px;height:34px;border-radius:50%;background:var(--blue-lt);color:var(--blue);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb{flex:1;min-width:0}
.ca{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbl{font-size:12px;color:var(--muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cn{font-size:11px;color:#bbb;margin-top:2px}
.cr{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.code{font-family:'Courier New',monospace;font-size:16px;font-weight:700;background:var(--amber);color:var(--amber-t);padding:5px 12px;border-radius:8px;cursor:pointer;user-select:none;letter-spacing:.05em;border:1px solid #f0d8a0}
.code:active{opacity:.7}
.cas{display:flex;gap:4px}
.bx{font-size:11px;padding:3px 8px;border-radius:6px;color:#555}
.bxd{color:var(--red);border-color:#f0c0c0}
.nb{font-size:9px;background:#e3f5e1;color:#1a7a1a;border:1px solid #b2dba8;border-radius:4px;padding:1px 5px;font-weight:700;vertical-align:middle;margin-left:4px}
.empty{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
#overlay.show{display:block}
.oi{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px}
#mbox{background:#fff;border-radius:18px;padding:20px 22px;max-width:520px;width:100%;margin:auto}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mt{font-size:17px;font-weight:700}
.mx{font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;color:#aaa;border-radius:50%}
.mx:hover{background:#f5f5f1}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
.hint{font-size:11px;color:#aaa;margin-top:4px;line-height:1.5}
.dup{font-size:12px;color:var(--red);font-weight:600;margin-top:4px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid #f0f0ea}
.bs{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700;font-size:14px;padding:10px 26px;border-radius:10px}
.bc{color:#666;border-color:#ddd}

/* AI box */
.aibox{background:#f5f8ff;border:1px solid #c5d5f5;border-radius:11px;padding:13px;margin-bottom:16px}
.ait{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:9px}
.air{display:flex;gap:8px}
.aib{flex:1;padding:9px;border-radius:9px;font-size:13px;font-weight:500;border:1px solid #c5d5f5;background:#fff;color:var(--blue);cursor:pointer}
.aib.cam{background:var(--blue);color:#fff;border-color:var(--blue)}
.aib:disabled{opacity:.4;cursor:default}
.sp{width:14px;height:14px;border:2px solid #c5d5f5;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ast{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:12px;color:#555}
.aok{font-size:12px;color:var(--green);font-weight:600;margin-top:8px}
.aerr{font-size:12px;color:var(--red);margin-top:8px}
.aprev{margin-top:10px;max-height:100px;max-width:100%;border-radius:8px;display:block;border:1px solid var(--border);object-fit:contain}

/* Sugg */
.sw{border:1px solid var(--border);border-radius:9px;margin-top:5px;overflow:hidden}
.sh{font-size:10px;padding:4px 11px;background:#f8f8f5;color:#bbb;font-weight:600}
.sr{padding:9px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid #f5f5f0;display:flex;align-items:center;gap:8px}
.sr:last-child{border-bottom:none}
.sr:hover{background:#f2f6ff}
.sa{font-weight:600}
.sb2{color:#999;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc{font-family:monospace;font-size:11px;background:var(--amber);color:var(--amber-t);padding:2px 7px;border-radius:4px;flex-shrink:0}

/* Batch */
.bdz{border:2px dashed #c8c8c0;border-radius:12px;padding:24px 16px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;background:#fafaf8;margin-bottom:14px;transition:border-color .15s,background .15s}
.bdz:hover,.bdz.over{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}
.bdz svg{margin:0 auto 8px;display:block;opacity:.45}
.bfmt{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.bfmt span{font-size:11px;background:#f0f0ea;color:#888;padding:2px 8px;border-radius:4px;border:1px solid #e0e0d5}
.bl{display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;margin-bottom:14px}
.bi{display:flex;align-items:center;gap:9px;border-radius:9px;padding:8px 11px;border:1px solid var(--border);font-size:13px}
.bi.bok{background:#f3fbf3;border-color:#b5ddb5}
.bi.bdup{background:#fff5f5;border-color:#f0c0c0}
.bd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dok{background:var(--green)}.ddup{background:var(--red)}
.baddr{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bbldg{font-size:11px;color:var(--muted)}
.bcode{font-family:monospace;font-size:12px;background:var(--amber);color:var(--amber-t);padding:1px 7px;border-radius:4px;flex-shrink:0}
.btag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0}
.tok{background:#dff5df;color:#1a7a1a}.tdup{background:#ffe0e0;color:var(--red)}
.bst{font-size:13px;color:#555;margin-bottom:10px;line-height:1.7}

/* Guide */
.gs{display:flex;gap:12px;margin-bottom:14px}
.gn{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.gtt{font-weight:600;font-size:14px;margin-bottom:2px}
.gd{font-size:13px;color:#666;line-height:1.55}
.wb{background:var(--amber);border-radius:9px;padding:11px 14px;font-size:12px;color:var(--amber-t);line-height:1.65;margin-bottom:14px}
.apisec{padding-top:14px;border-top:1px solid #f0f0ea;margin-top:4px}
.apist{font-size:11px;margin-top:6px;font-weight:600}
.agood{color:var(--green)}.abad{color:#c87000}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:22px;font-size:13px;z-index:999;opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;white-space:nowrap;font-weight:500}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:var(--red)}

/* Mobile */
#sbt{display:none}
@media(max-width:660px){
  :root{--side:156px;--top:50px}
  #sidebar{position:fixed;top:var(--top);left:0;bottom:0;z-index:100;transform:translateX(-100%);transition:transform .2s ease}
  #sidebar.open{transform:translateX(0);box-shadow:4px 0 16px rgba(0,0,0,.12)}
  #sbov{display:none;position:fixed;inset:0;top:var(--top);z-index:99;background:rgba(0,0,0,.2)}
  #sbov.show{display:block}
  #sbt{display:flex;width:32px;height:32px;padding:0;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
  .tbts button:not(.btnp){display:none}
  .appname{font-size:14px}
}
</style>
</head>
<body>
<div id="topbar">
  <button id="sbt" onclick="toggleSB()">☰</button>
  <span class="appname">回家之路</span>
  <span class="appcnt" id="hcnt"></span>
  <div id="sw">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>
    <input type="search" id="si" placeholder="住所・建物名・コード検索" oninput="onSrch(this.value)" autocomplete="off" spellcheck="false">
  </div>
  <div class="tbts">
    <button onclick="openM('guide')">⚙</button>
    <button onclick="doExp()">↓</button>
    <button onclick="trigImp()">↑</button>
    <button onclick="openM('batch')">📄 一括取込</button>
    <button class="btnp" onclick="openM('new')">＋ 追加</button>
  </div>
</div>
<div id="sbov" onclick="closeSB()"></div>
<div id="body">
  <div id="sidebar">
    <div class="sb-hdr"><span>エリア</span><span class="sb-hdr-hint">長押しで並替え</span></div>
    <div id="area-list"></div>
  </div>
  <div id="main"></div>
</div>
<div id="overlay" onclick="bgClick(event)"><div class="oi"><div id="mbox"></div></div></div>
<div id="toast"></div>
<input type="file" id="impf" accept=".json" style="display:none" onchange="doImpJSON(this)">
<input type="file" id="batchf" accept=".json,.xlsx,.xls,.csv,.tsv,.txt" multiple style="display:none" onchange="onBF(this)">
<input type="file" id="icam" accept="image/*" capture="environment" style="display:none" onchange="handleImg(this.files[0])">
<input type="file" id="ipick" accept="image/*" style="display:none" onchange="handleImg(this.files[0])">

<script>
// ── Utilities ─────────────────────────────────────────────────────────────────
function toH(s){return(s||'').replace(/[０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).replace(/[－ーｰ‐—―−]/g,'-').replace(/\u3000/g,' ').replace(/^東京都/,'').replace(/^墨田区/,'').trim();}
function pA(inp){
  const s=toH(inp||'');
  for(const p of[/^(.+?)\s*(\d+)丁目\s*(\d+)-(\d+)$/,/^(.+?)\s*(\d+)丁目\s*(\d+)番地?(\d+)号?$/,/^(.+?)\s+(\d+)-(\d+)-(\d+)$/,/^(.+?)(\d+)-(\d+)-(\d+)$/]){const m=s.match(p);if(m){const[,area,c,b,g]=m;return{area:area.trim(),chome:+c,banchi:+b,go:+g,normalized:`${area.trim()}${c}-${b}-${g}`};}}
  return{area:s,chome:0,banchi:0,go:0,normalized:s};
}
function sRecs(r){return[...r].sort((a,b)=>a.area.localeCompare(b.area,'ja')||a.chome-b.chome||a.banchi-b.banchi||a.go-b.go);}
function stripRm(s){return(s||'').replace(/\s*[-\s]?\d{3,4}(号室?)?$/,'').trim();}
function mkR(raw){const p=pA(raw.raw_addr||'');return{id:raw.id||Date.now(),raw_addr:(raw.raw_addr||'').trim(),building:(raw.building||'').trim(),code:String(raw.code||'').replace(/\.0$/,'').trim(),notes:raw.notes||'',updated:new Date().toISOString().split('T')[0],lastUsed:null,...p};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function sM(r,q){return toH([r.raw_addr,r.normalized,r.building,r.code,r.notes].join(' ')).toLowerCase().replace(/\s/g,'').includes(q);}

// ── Storage keys ──────────────────────────────────────────────────────────────
const LK='kaerinoie:v2',LA='kaerinoie:apikey',LO='kaerinoie:areaOrder';

// ── State ─────────────────────────────────────────────────────────────────────
let G={records:[],srch:'',area:'all',newId:null,modal:null,eform:null,aiSt:'idle',aiImg:null,batch:[],areaOrder:[]};

function lL(){try{const s=localStorage.getItem(LK);if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length)return sRecs(p);}}catch{}return null;}
function lS(r){try{localStorage.setItem(LK,JSON.stringify(r));}catch{}}
function gKey(){return localStorage.getItem(LA)||'';}
function sKey(k){k?localStorage.setItem(LA,k):localStorage.removeItem(LA);}
function loadOrder(){try{const s=localStorage.getItem(LO);if(s)return JSON.parse(s);}catch{}return[];}
function saveOrder(o){try{localStorage.setItem(LO,JSON.stringify(o));}catch{}}

// ── Ordered areas ─────────────────────────────────────────────────────────────
function getOrderedAreas(){
  const counts={};G.records.forEach(r=>{counts[r.area]=(counts[r.area]||0)+1;});
  const all=Object.keys(counts);
  const ordered=[];
  // First: put saved order items that still exist
  G.areaOrder.forEach(a=>{if(counts[a])ordered.push(a);});
  // Then: add any NEW areas not yet in order (sorted)
  all.sort((a,b)=>a.localeCompare(b,'ja')).forEach(a=>{if(!ordered.includes(a))ordered.push(a);});
  // Update saved order to reflect current reality
  if(JSON.stringify(G.areaOrder)!==JSON.stringify(ordered)){G.areaOrder=ordered;saveOrder(ordered);}
  return{counts,ordered};
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll(){renderSB();renderMain();}

function renderSB(){
  const {counts,ordered}=getOrderedAreas();
  const allCnt=G.records.length;
  // "全て" always first, fixed
  let html=`<div class="acard${G.area==='all'?' active':''}" onclick="setArea('all')">
    <div class="acard-name">全て</div>
    <div class="acard-row"><span class="acard-cnt">${allCnt}</span></div>
  </div>`;
  // Ordered draggable areas
  ordered.forEach((a,i)=>{
    const act=G.area===a?' active':'';
    html+=`<div class="acard${act}" data-area="${esc(a)}" data-idx="${i}"
      draggable="true"
      ondragstart="dragStart(event,'${esc(a)}')"
      ondragover="dragOver(event)"
      ondragleave="dragLeave(event)"
      ondrop="doDrop(event,'${esc(a)}')"
      ondragend="dragEnd(event)"
      onclick="setArea('${esc(a)}')"
    >
      <div class="acard-name">${esc(a)}</div>
      <div class="acard-row">
        <span class="acard-cnt">${counts[a]||0}</span>
        <span class="acard-drag" title="ドラッグで並替え"
          onmousedown="e=>e.stopPropagation()"
          ontouchstart="touchDragStart(event,'${esc(a)}')"
        >⠿</span>
      </div>
    </div>`;
  });
  document.getElementById('area-list').innerHTML=html;
  document.getElementById('hcnt').textContent=`${G.records.length}件`;
}

function renderMain(){
  const q=toH(G.srch).toLowerCase().replace(/\s/g,'');
  let list=G.records;
  if(G.area!=='all')list=list.filter(r=>r.area===G.area);
  if(q)list=list.filter(r=>sM(r,q));
  list=sRecs(list);
  if(!list.length){document.getElementById('main').innerHTML=`<div class="empty">${G.srch?'検索結果がありません':'データがありません'}</div>`;return;}
  document.getElementById('main').innerHTML=list.map(r=>{
    const isN=r.id===G.newId;
    const bldg=r.building||'<span style="color:#ccc">建物名なし</span>';
    const nb=isN?'<span class="nb">NEW</span>':'';
    return`<div class="card${isN?' nc':''}" id="card-${r.id}">
      <div class="ci">${r.area.charAt(0)||'?'}</div>
      <div class="cb"><div class="ca">${esc(r.normalized)}${nb}</div><div class="cbl">${bldg}</div>${r.notes?`<div class="cn">${esc(r.notes)}</div>`:''}</div>
      <div class="cr">
        <div class="code" onclick="cpCode('${esc(r.code)}','${r.id}')">${esc(r.code)}</div>
        <div class="cas">
          <button class="bx" onclick="cpAddr('${esc(r.normalized)}','${r.id}')">住所</button>
          <button class="bx" onclick="openM('edit',${r.id})">編集</button>
          <button class="bx bxd" onclick="openM('del',${r.id})">削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Drag & Drop reorder ───────────────────────────────────────────────────────
let _dragSrc=null;
function dragStart(e,a){_dragSrc=a;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function dragEnd(e){e.currentTarget.classList.remove('dragging','drag-over');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');return false;}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function doDrop(e,target){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!_dragSrc||_dragSrc===target)return;
  const o=[...G.areaOrder];
  const fi=o.indexOf(_dragSrc),ti=o.indexOf(target);
  if(fi<0||ti<0)return;
  o.splice(fi,1);o.splice(ti,0,_dragSrc);
  G.areaOrder=o;saveOrder(o);_dragSrc=null;renderSB();
}

// Touch drag for mobile
let _tDragArea=null,_tClone=null,_tItems=null,_tTarget=null;
function touchDragStart(e,a){
  e.stopPropagation();
  _tDragArea=a;
  const el=e.currentTarget.closest('.acard');
  _tItems=document.querySelectorAll('.acard[data-area]');
  // Clone for visual
  _tClone=el.cloneNode(true);
  Object.assign(_tClone.style,{position:'fixed',width:el.offsetWidth+'px',opacity:'.7',pointerEvents:'none',zIndex:'9999',borderColor:'var(--blue)',background:'var(--blue-lt)'});
  document.body.appendChild(_tClone);
  document.addEventListener('touchmove',onTouchMove,{passive:false});
  document.addEventListener('touchend',onTouchEnd);
}
function onTouchMove(e){
  e.preventDefault();
  const t=e.touches[0];
  _tClone.style.left=(t.clientX-60)+'px';
  _tClone.style.top=(t.clientY-20)+'px';
  // Find target card
  _tTarget=null;
  _tItems.forEach(el=>{
    el.classList.remove('drag-over');
    const r=el.getBoundingClientRect();
    if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom){
      _tTarget=el.dataset.area;el.classList.add('drag-over');
    }
  });
}
function onTouchEnd(){
  document.removeEventListener('touchmove',onTouchMove);
  document.removeEventListener('touchend',onTouchEnd);
  if(_tClone){_tClone.remove();_tClone=null;}
  _tItems&&_tItems.forEach(el=>el.classList.remove('drag-over'));
  if(_tDragArea&&_tTarget&&_tDragArea!==_tTarget){
    const o=[...G.areaOrder];
    const fi=o.indexOf(_tDragArea),ti=o.indexOf(_tTarget);
    if(fi>=0&&ti>=0){o.splice(fi,1);o.splice(ti,0,_tDragArea);}
    G.areaOrder=o;saveOrder(o);
  }
  _tDragArea=null;_tTarget=null;renderSB();
}

function onSrch(v){G.srch=v;renderMain();}

function cpAddr(a,id){navigator.clipboard.writeText(a).then(()=>{toast('住所 コピー完了');touch(id);}).catch(()=>toast('失敗',true));}
function touch(id){G.records=G.records.map(r=>r.id==id?{...r,lastUsed:new Date().toISOString()}:r);lS(G.records);}

// ── File Parsing ──────────────────────────────────────────────────────────────
function parseBatch(files){
  let all=[],pend=files.length;if(!pend)return;
  files.forEach(file=>{
    const name=file.name.toLowerCase();
    if(name.endsWith('.json'))parseJSON(file,r=>{all=all.concat(r);if(--pend===0)procBatch(all);});
    else if(name.endsWith('.xlsx')||name.endsWith('.xls'))parseExcel(file,r=>{all=all.concat(r);if(--pend===0)procBatch(all);});
    else if(name.endsWith('.csv')||name.endsWith('.tsv')||name.endsWith('.txt'))parseCSV(file,r=>{all=all.concat(r);if(--pend===0)procBatch(all);});
    else{if(--pend===0)procBatch(all);}
  });
}

function parseJSON(file,cb){
  const r=new FileReader();r.onload=e=>{
    try{const raw=JSON.parse(e.target.result);const arr=Array.isArray(raw)?raw:Array.isArray(raw.records)?raw.records:[];
    cb(arr.filter(r=>r.raw_addr&&r.code).map(r=>mkR(r)));}catch{cb([]);}
  };r.readAsText(file);
}

function parseExcel(file,cb){
  if(typeof XLSX==='undefined'){cb([]);toast('SheetJS 未ロード',true);return;}
  const r=new FileReader();r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      let all=[];
      wb.SheetNames.forEach(sn=>{
        const ws=wb.Sheets[sn];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        all=all.concat(rowsToRecs(rows));
      });
      cb(all);
    }catch(err){cb([]);toast('Excel読み込みエラー: '+err.message,true);}
  };r.readAsArrayBuffer(file);
}

function parseCSV(file,cb){
  const r=new FileReader();r.onload=e=>{
    try{
      const text=e.target.result;
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length){cb([]);return;}
      // Detect separator
      const sep=text.includes('\t')?'\t':',';
      const headers=lines[0].split(sep).map(h=>h.replace(/^"|"$/g,'').trim());
      const rows=lines.slice(1).map(line=>{
        const vals=splitCSVLine(line,sep);
        const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||'';});return obj;
      });
      cb(rowsToRecs(rows));
    }catch{cb([]);}
  };r.readAsText(file,'UTF-8');
}

function splitCSVLine(line,sep){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===sep&&!inQ){res.push(cur);cur='';}else{cur+=c;}}
  res.push(cur);return res.map(s=>s.replace(/^"|"$/g,'').trim());
}

// Map various column names to our schema
function rowsToRecs(rows){
  return rows.map(row=>{
    const get=(...keys)=>{for(const k of keys){const v=row[k]||row[k.toLowerCase()]||row[k.toUpperCase()]||'';if(String(v).trim())return String(v).trim();}return'';};
    const addr=get('raw_addr','住所','address','アドレス','Address','標準地址','原始地址');
    const bldg=get('building','建物名','建物','マンション名','Building');
    const code=get('code','アクセスコード','門禁コード','密码','Code','コード','门禁密碼');
    const notes=get('notes','備考','メモ','Notes','Memo');
    if(!addr||!code)return null;
    return mkR({raw_addr:addr,building:bldg,code,notes});
  }).filter(Boolean);
}

function procBatch(inc){
  const seen=new Set();
  G.batch=inc.map(rec=>{
    const norm=rec.normalized;
    const ex=G.records.find(r=>r.normalized===norm);const self=seen.has(norm);seen.add(norm);
    const isDup=!!(ex||self);
    const dupWith=ex?(ex.building||ex.normalized):self?'このファイル内に同じ住所':'';
    return{rec,isDup,dupWith};
  });
  renderM();
}
function doBatch(){
  const toAdd=G.batch.filter(i=>!i.isDup).map(i=>i.rec);if(!toAdd.length)return;
  let mx=Math.max(0,...G.records.map(r=>r.id));
  G.records=sRecs([...G.records,...toAdd.map(r=>({...r,id:++mx}))]);
  lS(G.records);closeM();renderAll();toast(`${toAdd.length}件を追加しました`);
}

// ── AI Image ──────────────────────────────────────────────────────────────────
function handleImg(file){
  if(!file)return;const k=gKey();if(!k){toast('APIキー未設定。設定⚙から入力してください',true);return;}
  G.aiSt='reading';G.aiImg=null;renderM();
  const reader=new FileReader();reader.onload=async e=>{
    const du=e.target.result;G.aiImg=du;G.aiSt='parsing';renderM();
    try{
      const res=await callCl(du.split(',')[1],file.type||'image/jpeg',k);
      const bldg=stripRm(res.building||'');
      Object.assign(G.eform,{raw_addr:res.address||G.eform.raw_addr,building:bldg,code:res.code||G.eform.code});
      G.aiSt='done';renderM();
      ['fa','fb','fc'].forEach((id,i)=>{const el=document.getElementById(id);if(el)el.value=[G.eform.raw_addr,G.eform.building,G.eform.code][i];});
      if(G.eform.raw_addr)onAI(G.eform.raw_addr);
    }catch(err){G.aiSt='error';renderM();toast('AI解析失敗: '+err.message,true);}
  };reader.readAsDataURL(file);
  document.getElementById('icam').value='';document.getElementById('ipick').value='';
}
async function callCl(b64,mt,k){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:b64}},{type:'text',text:`この画像はAmazon配達アプリのスクリーンショットです。JSON形式だけ返してください：\n{"address":"住所（東京都・墨田区除く、例:東向島6-38-3）","building":"建物名のみ（部屋番号絶対含めない）","code":"アクセスコードの値（記号も含む、なければ空）","notes":""}\nアクセスコードは「アクセスコード：」の後の値`}]}]})});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`);}
  const d=await r.json();const t=d.content?.map(c=>c.text||'').join('')||'';
  const m=t.match(/\{[\s\S]*\}/);if(!m)throw new Error('JSON not found');return JSON.parse(m[0]);
}
